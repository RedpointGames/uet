syntax = "proto3";

package Redpoint.Grpc.Transport.Tcp;

message TcpUnaryCall {
}

message TcpClientStreamingCall {
}

message TcpServerStreamingCall {
}

message TcpDuplexStreamingCall {
}

message TcpCall {
    string serviceName = 1;
    string methodName = 2;
    oneof callType {
        TcpUnaryCall unaryCall = 3;
        TcpClientStreamingCall clientStreamingCall = 4;
        TcpServerStreamingCall serverStreamingCall = 5;
        TcpDuplexStreamingCall duplexStreamingCall = 6;
    }
}